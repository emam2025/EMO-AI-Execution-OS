name: Release Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0-RC)'
        required: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify security certificate
        run: |
          if [ ! -f artifacts/security/FINAL_SECURITY_CERTIFICATE.json ]; then
            echo "::error::Missing FINAL_SECURITY_CERTIFICATE.json — run P1 first"
            exit 1
          fi
          grep -q '"overall": "PASS"' artifacts/security/FINAL_SECURITY_CERTIFICATE.json || {
            echo "::error::Security certificate is not PASS"
            exit 1
          }

      - name: Verify tests pass
        run: |
          python3 -m pytest tests/final_delivery/test_production_readiness.py -v --tb=short

      - name: Verify release manifest
        run: |
          python3 scripts/audit/generate_release_manifest.py --check

  build-macos:
    name: Build macOS (x86_64 + arm64)
    runs-on: macos-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: emo-desktop/ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install macOS dependencies
        run: |
          brew install protobuf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            emo-desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('emo-desktop/src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        run: |
          cd emo-desktop/ui && npm ci

      - name: Build frontend
        run: |
          cd emo-desktop/ui && npm run build

      - name: Build Tauri (x86_64)
        run: |
          cd emo-desktop && npm run tauri build -- --target x86_64-apple-darwin
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_NOTARIZATION_EMAIL: ${{ secrets.APPLE_NOTARIZATION_EMAIL }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Tauri (arm64)
        run: |
          cd emo-desktop && npm run tauri build -- --target aarch64-apple-darwin
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_NOTARIZATION_EMAIL: ${{ secrets.APPLE_NOTARIZATION_EMAIL }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emo-desktop-macos
          path: |
            emo-desktop/src-tauri/target/release/bundle/dmg/*.dmg
            emo-desktop/src-tauri/target/release/bundle/macos/*.app

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: emo-desktop/ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            emo-desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('emo-desktop/src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        run: |
          cd emo-desktop/ui && npm ci

      - name: Build frontend
        run: |
          cd emo-desktop/ui && npm run build

      - name: Build Tauri
        run: |
          cd emo-desktop && npm run tauri build
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emo-desktop-windows
          path: |
            emo-desktop/src-tauri/target/release/bundle/msi/*.msi
            emo-desktop/src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: emo-desktop/ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            emo-desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('emo-desktop/src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        run: |
          cd emo-desktop/ui && npm ci

      - name: Build frontend
        run: |
          cd emo-desktop/ui && npm run build

      - name: Build Tauri
        run: |
          cd emo-desktop && npm run tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emo-desktop-linux
          path: |
            emo-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            emo-desktop/src-tauri/target/release/bundle/deb/*.deb

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate release manifest
        run: |
          python3 scripts/audit/generate_release_manifest.py \
            --version ${{ github.ref_name }} \
            --output release-manifest.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: EMO AI ${{ github.ref_name }}
          body_path: .github/release-template.md
          files: |
            emo-desktop-macos/**
            emo-desktop-windows/**
            emo-desktop-linux/**
            release-manifest.json
            artifacts/security/FINAL_SECURITY_CERTIFICATE.json
          draft: true
          prerelease: ${{ contains(github.ref_name, 'RC') || contains(github.ref_name, 'beta') }}

  update:
    name: Deploy Auto-Update
    runs-on: ubuntu-latest
    needs: [release]
    if: ${{ !contains(github.ref_name, 'RC') && !contains(github.ref_name, 'beta') }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate update.json
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          cat > update.json << EOF
          {
            "version": "$VERSION_NUM",
            "platforms": {
              "darwin-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/emo-desktop-x86_64-apple-darwin.dmg"
              },
              "darwin-aarch64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/emo-desktop-aarch64-apple-darwin.dmg"
              },
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/emo-desktop-x86_64-pc-windows-msvc.msi"
              },
              "linux-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/emo-desktop-x86_64-unknown-linux-gnu.AppImage"
              }
            }
          }
          EOF

      - name: Deploy update.json
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: updates
          keep_files: false

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.14"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          python -m pip install --upgrade pip
          pip install flake8 ruff mypy
      - name: flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude venv,venv3,.git,__pycache__
      - name: ruff
        run: ruff check . --exclude venv,venv3,.git,__pycache__ || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: Bandit
        run: bandit -r core/ -ll -f json -o bandit-report.json || true
      - name: pip-audit
        run: pip-audit --format=json --output=pip-audit.json || true
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit.json

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker build -t emo-ai:${{ github.sha }} .
          docker tag emo-ai:${{ github.sha }} emo-ai:latest
      - name: Test image
        run: |
          docker run --rm -e EMO_JWT_SECRET=test -e EMO_AUTH_MODE=migration \
            emo-ai:latest python -c "print('Docker image OK')"

  gate:
    name: Production Gate
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan, docker]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Security: ${{ needs.security-scan.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "ERROR: Lint failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "ERROR: Tests failed"
            exit 1
          fi
          echo "All jobs passed. Production gate OPEN."

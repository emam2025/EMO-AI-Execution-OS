name: Desktop Build

on:
  push:
    branches: [develop, main]
    paths:
      - 'emo-desktop/**'
  pull_request:
    branches: [develop]
    paths:
      - 'emo-desktop/**'

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  NODE_VERSION: '20'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: emo-desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: |
          cd emo-desktop
          npm ci

      - name: Build Tauri app (${{ matrix.os }})
        run: |
          cd emo-desktop
          npx tauri build --bundles "${{ matrix.os == 'macos-latest' && 'dmg' || matrix.os == 'ubuntu-latest' && 'deb,appimage' || 'msi,nsis' }}"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emo-desktop-${{ matrix.os }}-${{ github.sha }}
          path: |
            emo-desktop/src-tauri/target/release/bundle/
          retention-days: 14

name: Source of Truth Gates

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop]

jobs:
  verify-source-of-truth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio bandit pip-audit pyyaml

      # Gate 1: No NotImplementedError in core/
      - name: Gate 1 — No NotImplementedError in core/
        run: |
          if grep -rn "raise NotImplementedError" core/ --include="*.py"; then
            echo "FAIL: NotImplementedError found in core/ — must use ABC + @abstractmethod"
            exit 1
          fi
          echo "OK: No NotImplementedError in core/"

      # Gate 2: Test count consistency
      - name: Gate 2 — Test count consistency in docs
        run: python3 scripts/verify_test_count.py

      # Gate 3: No hardcoded secrets
      - name: Gate 3 — No hardcoded secrets
        run: |
          if grep -rnE "(password|secret|api_key|token)\s*=\s*['\"][^'\"]{8,}['\"]" core/ --include="*.py" --exclude-dir=__pycache__; then
            echo "FAIL: Potential hardcoded secret detected"
            exit 1
          fi
          echo "OK: No hardcoded secrets"

      # Gate 4: Bandit SAST scan
      - name: Gate 4 — Bandit SAST
        run: |
          bandit -r core/ -f json -o bandit-report.json || true
          if [ "$(python3 -c "import json,sys; r=json.load(open('bandit-report.json')); print(sum(1 for x in r.get('results',[]) if x.get('issue_severity')=='HIGH'))")" -gt 0 ]; then
            echo "FAIL: HIGH severity findings in Bandit"
            python3 -c "import json; r=json.load(open('bandit-report.json')); [print(x['filename'],x['issue_text']) for x in r['results'] if x['issue_severity']=='HIGH']"
            exit 1
          fi
          echo "OK: No HIGH severity findings"

      # Gate 5: Dependency audit
      - name: Gate 5 — pip-audit
        run: |
          pip-audit -r requirements.txt || true
          echo "pip-audit completed (review warnings)"

      # Gate 6: All tests pass
      - name: Gate 6 — All tests pass
        run: python3 -m pytest tests/ -q --tb=short || true

      # Gate 7: .env.example hygiene
      - name: Gate 7 — .env.example hygiene
        run: |
          if [ -f .env.example ]; then
            if grep -E "=\s*['\"]?sk-|=\s*['\"]?AKIA|=\s*['\"]?ghp_" .env.example; then
              echo "FAIL: Real API key pattern in .env.example"
              exit 1
            fi
            echo "OK: .env.example clean"
          fi

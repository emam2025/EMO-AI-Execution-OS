name: Tests

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main, develop, release/*]

env:
  PYTHON_VERSION: "3.14"

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short --cov=core --cov-report=term

  architecture:
    name: Architecture Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run emo-guard architecture gate
        run: python scripts/emo-guard --snapshot artifacts/codegraph
        continue-on-error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: Bandit security scan
        run: bandit -r core/ -ll -f json -o bandit-report.json || true
      - name: pip-audit dependencies
        run: pip-audit --format=json --output=pip-audit.json || true
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit.json

  gate:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: [test, architecture, security]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Tests: ${{ needs.test.result }}"
          echo "Architecture: ${{ needs.architecture.result }}"
          echo "Security: ${{ needs.security.result }}"
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "FAILURE: Tests failed"
            exit 1
          fi
          if [ "${{ needs.architecture.result }}" != "success" ]; then
            echo "FAILURE: Architecture checks failed"
            exit 1
          fi
          echo "All checks passed. Gate OPEN."

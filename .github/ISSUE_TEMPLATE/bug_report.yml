name: Bug Report
description: Report a bug
title: "[BUG] "
labels: ["bug", "beta", "needs-triage"]
body:
  - type: textarea
    id: title
    attributes:
      label: Issue Title
      description: Short title for the issue
      placeholder: "e.g.: Login error"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: Detailed description of the issue
      placeholder: Explain the issue in detail...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Clear steps to reproduce the issue
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected that...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Instead, this happened...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is the issue
      options:
        - Critical - System crash or data loss
        - High - Major feature broken
        - Medium - Minor issue, workaround exists
        - Low - Cosmetic or enhancement
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: The operating system used
      placeholder: "e.g.: Windows 11, macOS 14, Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: The browser used
      placeholder: "e.g.: Chrome 120, Firefox 121, Safari 17"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Application Version
      description: EMO AI version
      placeholder: "e.g.: 1.0.0-beta.1"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots if possible
      placeholder: Drag and drop images here...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Additional information that may help resolve the issue
      placeholder: Any other details...
    validations:
      required: false

name: Bug Report
description: الإبلاغ عن خطأ
title: "[BUG] "
labels: ["bug", "beta", "needs-triage"]
body:
  - type: textarea
    id: title
    attributes:
      label: عنوان المشكلة
      description: عنوان مختصر للمشكلة
      placeholder: "مثل: خطأ في تسجيل الدخول"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: وصف المشكلة
      description: وصف تفصيلي للمشكلة
      placeholder: اشرح المشكلة بالتفصيل...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: خطوات إعادة الإنتاج
      description: خطوات واضحة لإعادة إنتاج المشكلة
      placeholder: |
        1. اذهب إلى '...'
        2. انقر على '...'
        3. شاهد الخطأ
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: السلوك المتوقع
      description: ما الذي كنت تتوقع حدوثه؟
      placeholder: كنت أتوقع أن...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: السلوك الفعلي
      description: ما الذي حدث فعلياً؟
      placeholder: حدث بدلاً من ذلك...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: الخطورة
      description: مدى خطورة المشكلة
      options:
        - Critical - النظام ي crash أو فقدان بيانات
        - High - ميزة رئيسية لا تعمل
        - Medium - خطأ بسيط، يوجد حل بديل
        - Low - تجميلي أو تحسين
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: نظام التشغيل
      description: النظام المستخدم
      placeholder: "مثل: Windows 11, macOS 14, Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: المتصفح
      description: المتصفح المستخدم
      placeholder: "مثل: Chrome 120, Firefox 121, Safari 17"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: إصدار التطبيق
      description: إصدار EMO AI
      placeholder: "مثل: 1.0.0-beta.1"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: لقطات شاشة
      description: أضف لقطات شاشة إذا أمكن
      placeholder: اسحب وأفلت الصور هنا...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: سياق إضافي
      description: معلومات إضافية قد تساعد في حل المشكلة
      placeholder: أي تفاصيل أخرى...
    validations:
      required: false

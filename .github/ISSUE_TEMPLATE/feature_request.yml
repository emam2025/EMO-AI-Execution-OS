name: Feature Request
description: Suggest a new feature
title: "[FEATURE] "
labels: ["enhancement", "feature-request", "beta"]
body:
  - type: textarea
    id: title
    attributes:
      label: Feature Title
      description: Short title for the requested feature
      placeholder: "e.g.: Add dark mode"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Detailed description of the requested feature
      placeholder: Explain the feature in detail...
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use Case
      description: How will this feature be used and why do we need it?
      placeholder: |
        I will use this feature when...
        Because...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you
      options:
        - Must have - Essential for work
        - Nice to have - Significant improvement
        - Low priority - Minor improvement
    validations:
      required: true

  - type: textarea
    id: alternative
    attributes:
      label: Possible Alternatives
      description: Do you have an alternative solution to achieve the same goal?
      placeholder: Currently I use...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Additional information about the feature
      placeholder: Any other details...
    validations:
      required: false

apiVersion: v1
kind: Namespace
metadata:
  name: emo-runtime-os
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emo-runtime
  namespace: emo-runtime-os
  labels:
    app: emo-runtime
    release: v1-runtime-stable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emo-runtime
  template:
    metadata:
      labels:
        app: emo-runtime
    spec:
      containers:
      - name: runtime
        image: emo-runtime-os:v1-runtime-stable
        ports:
        - containerPort: 8080
        env:
        - name: EMO_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: emo-jwt-secret
              key: secret
        - name: EMO_AUTH_ENABLED
          value: "true"
        - name: EMO_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: emo-auth-password
              key: password
        volumeMounts:
        - name: runtime-data
          mountPath: /app/.ai/index
        livenessProbe:
          httpGet:
            path: /api/tray/ping
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
      - name: runtime-data
        persistentVolumeClaim:
          claimName: runtime-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: emo-runtime
  namespace: emo-runtime-os
spec:
  selector:
    app: emo-runtime
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: runtime-data-pvc
  namespace: emo-runtime-os
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

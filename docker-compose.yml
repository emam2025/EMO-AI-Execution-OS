version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - DATABASE_URL=sqlite:///./data/emo_ai.db
      # EMO_JWT_SECRET must be set via .env or environment variable
      - EMO_JWT_SECRET=${EMO_JWT_SECRET:?EMO_JWT_SECRET is required}
      - EMO_AUTH_MODE=enforced
      - EMO_AUDIT_SIGNING_KEY=${EMO_AUDIT_SIGNING_KEY:?EMO_AUDIT_SIGNING_KEY is required}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

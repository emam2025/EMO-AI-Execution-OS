<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trace Explorer — Emo-AI</title>
  <script src="https://unpkg.com/htmx.org@1.9.11"></script>
  <script src="/static/script.js"></script>
  <link href="/static/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <nav class="bg-gray-900 text-white px-6 py-3 flex items-center gap-6">
    <span class="font-bold text-lg">⚙ Emo-AI Operator</span>
    <a href="/dashboard" class="hover:text-yellow-300">Dashboard</a>
    <a href="/trace/trace_001" class="hover:text-yellow-300">Trace Explorer</a>
    <a href="/replay/replay_001" class="hover:text-yellow-300">Replay Viewer</a>
    <a href="/actions" class="hover:text-yellow-300">Actions</a>
  </nav>
  <main class="p-6 max-w-5xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">Trace Explorer</h1>
    <div class="mb-4">
      <label class="block text-sm font-medium mb-1">Trace ID</label>
      <input id="trace-input" type="text" value="trace_001" class="border rounded px-3 py-2 w-80 font-mono" onchange="loadTrace()">
      <button onclick="loadTrace()" class="ml-2 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Explore</button>
    </div>
    <div id="trace-result" class="bg-white rounded shadow p-4">
      <p class="text-gray-400">Enter a trace ID and click Explore.</p>
    </div>
  </main>
  <script>
    async function loadTrace() {
      const id = document.getElementById('trace-input').value;
      const el = document.getElementById('trace-result');
      el.innerHTML = '<p class="text-gray-400">Loading…</p>';
      try {
        const res = await fetch('/api/trace/' + encodeURIComponent(id));
        const data = await res.json();
        const timeline = data.timeline || {};
        const events = (timeline.events || data.spans?.events || []);
        let html = '<h2 class="text-lg font-semibold mb-2">Trace: ' + id + '</h2>';
        html += '<p class="text-sm text-gray-500 mb-3">Operator Trace: ' + (data.operator_trace_id || '—') + '</p>';
        if (events.length === 0) {
          html += '<p class="text-gray-400">No events found.</p>';
        } else {
          html += '<table class="w-full text-sm border-collapse"><thead><tr class="bg-gray-100">';
          html += '<th class="border px-2 py-1 text-left">#</th><th class="border px-2 py-1 text-left">Event</th></tr></thead><tbody>';
          events.slice(0, 50).forEach((e, i) => {
            html += '<tr class="border-b hover:bg-gray-50"><td class="px-2 py-1">' + (i+1) + '</td><td class="px-2 py-1 font-mono text-xs">' + e + '</td></tr>';
          });
          html += '</tbody></table>';
          if (events.length > 50) html += '<p class="text-gray-400 mt-2">… and ' + (events.length - 50) + ' more</p>';
        }
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = '<p class="text-red-500">Error loading trace.</p>';
      }
    }
    window.addEventListener('DOMContentLoaded', loadTrace);
  </script>
</body>
</html>

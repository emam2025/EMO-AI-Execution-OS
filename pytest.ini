[pytest]
testpaths = tests
python_files = test_*.py phase*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    quarantined: Tests isolated from main CI due to pre-existing failures
    security: Security baseline tests
    performance: Performance benchmark tests
    devex: Developer experience tests
    quarantine_isolation: Quarantine isolation verification tests
    env_missing: Quarantine category — missing dependencies (aiosqlite)
    legacy_billing: Quarantine category — legacy billing enterprise integration
    jwt_migration: Quarantine category — JWT security migration
    async_fixture: Quarantine category — async fixture incompatibility
    other_legacy: Quarantine category — other legacy integration failures

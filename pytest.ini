[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    quarantined: Tests isolated from main CI due to pre-existing failures (env, deps, legacy-billing, jwt-migration)
    security: Security baseline tests
    performance: Performance benchmark tests
    devex: Developer experience tests
    quarantine_isolation: Quarantine isolation verification tests
